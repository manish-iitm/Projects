<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="10;URL='https://procr-nu.vercel.app/'" />
    <title>Delivering Perfection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0e12;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            text-align: center;
            background: #161822;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #25293c;
        }

        .status-badge {
            display: inline-block;
            background: rgba(255, 170, 0, 0.1);
            color: #ffaa00;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 16px;
            background: linear-gradient(45deg, #ffaa00, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #9ca3af;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .highlight {
            color: #ffffff;
            font-weight: 600;
        }

        .redirect-text {
            font-size: 0.9rem;
            color: #6b7280;
            margin-top: 15px;
        }

        #timer {
            color: #ffaa00;
            font-weight: bold;
        }

        .loader {
            display: inline-block;
            width: 50px;
            height: 4px;
            background: #25293c;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }

        .loader-bar {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, #ffaa00, #ff4500);
            width: 70%;
            animation: loading 2s infinite ease-in-out;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(150%); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">Cooking Something Big</div>
        <h1>Worth the Wait.</h1>
        <p>I promised this website on <span class="highlight">July 1st</span>. It’s taking a little longer than planned, but only because I am making sure it delivers the <span class="highlight">absolute best value</span> for you.</p>
        <p>Quality takes time. Stay tuned.</p>
        
        <div class="loader">
            <span class="loader-bar"></span>
        </div>

        <p class="redirect-text">Redirecting you in <span id="timer">10</span> seconds...</p>
    </div>

    <script>
        // Simple countdown script to match the meta refresh
        let timeLeft = 10;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
            }
        }, 1000);
    </script>

</body>
</html>
