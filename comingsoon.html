<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Under Development</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f5f7ff;
        }
        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .content {
            width: 100%;
            padding: clamp(2rem, 5vw, 6rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 2;
            order: 2;
        }
        .badge {
            display: inline-block;
            background-color: rgba(67, 97, 238, 0.1);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            width: fit-content;
        }
        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: clamp(1rem, 2vw, 1.125rem);
            color: var(--gray);
            margin-bottom: 2rem;
            max-width: 90%;
        }
        .visual {
            width: 100%;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            min-height: 50vh;
            order: 1;
        }
        .visual::before {
            content: '';
            position: absolute;
            width: min(60vw, 300px);
            height: min(60vw, 300px);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            top: min(-10vw, -50px);
            right: min(-10vw, -50px);
        }
        .code-animation {
            width: 100%;
            max-width: min(90vw, 600px);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }
        .code-animation img {
            width: 100%;
            height: auto;
            display: block;
        }
        .progress-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 2rem;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--gray);
        }
        .progress-bar {
            height: 6px;
            background: rgba(67, 97, 238, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            width: 65%;
            background: var(--primary);
            border-radius: 3px;
            animation: progress 2s ease-in-out infinite alternate;
        }
        @keyframes progress {
            0% { width: 65%; }
            100% { width: 75%; }
        }
        .social-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .social-links a {
            color: var(--gray);
            transition: all 0.3s;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .social-links a:hover {
            color: var(--primary);
        }
        @media (min-width: 768px) {
            .container {
                flex-direction: row;
            }
            .content {
                width: 50%;
                order: 1;
            }
            .visual {
                width: 50%;
                min-height: 100vh;
                order: 2;
            }
            p {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <span class="badge">UNDER DEVELOPMENT</span>
            <h1>Website Under Construction</h1>
            <p>I'm working hard to build something amazing. Please check back soon for updates!</p>
            
            <div class="progress-container">
                <div class="progress-info">
                    <span>Development Progress</span>
                    <span>65%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
            </div>
            
            <div class="social-links">
                <a href="mailto:Mpstudy65@gmail.com">Notify Me</a>
            </div>
        </div>
        
        <div class="visual">
            <div class="code-animation">
                <img src="https://i.giphy.com/media/2IudUHdI075HL02Pkk/giphy.webp" alt="Developer coding animation">
            </div>
        </div>
    </div>
</body>
</html>
